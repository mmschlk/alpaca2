<div class="alert alert-info mt-2 d-flex align-items-center justify-content-between gap-3 flex-wrap">
  <div>
    Found rank
    <span class="badge {% if rank == 'A*' %}bg-danger{% elif rank == 'A' %}bg-warning text-dark{% elif rank == 'B' %}bg-info text-dark{% else %}bg-secondary{% endif %} fs-6">
      {{ rank }}
    </span>
    <span class="text-muted small ms-1">({{ source }})</span>
    {% if current_rank and current_rank != rank %}
    <span class="text-muted small ms-2">· current: <strong>{{ current_rank }}</strong></span>
    {% elif current_rank == rank %}
    <span class="text-muted small ms-2">· already up to date</span>
    {% endif %}
  </div>
  <div class="d-flex gap-2">
    {% if current_rank != rank %}
    <form hx-post="/conferences/{{ conf_id }}/core-rank" hx-target="#core-rank-section">
      <input type="hidden" name="rank" value="{{ rank }}">
      <button class="btn btn-sm btn-success">Apply</button>
    </form>
    {% endif %}
    <button class="btn btn-sm btn-outline-secondary"
            onclick="document.getElementById('core-rank-section').innerHTML=''">Dismiss</button>
  </div>
</div>
