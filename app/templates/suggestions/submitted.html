{% extends "base.html" %}
{% block title %}Suggestion Submitted{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-check-circle-fill text-success" style="font-size:4rem"></i>
  <h4 class="mt-3 fw-bold">Thank you!</h4>
  <p class="text-muted">Your suggestion has been submitted and is pending moderator review.</p>
  <div class="d-flex gap-2 justify-content-center mt-4">
    <a href="/suggest/my" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-list-ul me-1"></i>My Suggestions
    </a>
    <a href="/" class="btn btn-primary btn-sm">
      <i class="bi bi-house me-1"></i>Dashboard
    </a>
  </div>
</div>
{% endblock %}
